name: Deploy React site to Pages

on:
  push:
    branches: ["main"] # 如果你的預設分支是 master，請改成 "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20 # 使用穩定的 Node 版本
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # 比 npm install 更適合 CI 環境，速度更快

      - name: Build React App
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ⚠️ 注意：這裡要根據你的 React 框架選擇產出的資料夾
          # 如果是 Vite (React)，填入 ./dist
          # 如果是 Create React App (CRA)，填入 ./build
          path: ./dist 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
